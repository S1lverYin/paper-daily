name: Paper Daily

on:
  schedule:
    # Candidate collector slots. scripts/check_active_schedule.py lets only
    # config/active_schedule.json's active cron collect, deploy, and notify.
    - cron: '0 23 * * *'  # 07:00 Asia/Shanghai
    - cron: '15 23 * * *' # 07:15 Asia/Shanghai
    - cron: '30 23 * * *' # 07:30 Asia/Shanghai
    - cron: '45 23 * * *' # 07:45 Asia/Shanghai
    - cron: '0 0 * * *'   # 08:00 Asia/Shanghai
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '回看天数（留空则使用 cron 默认值 1）'
        required: false
        type: number
      clear_cache:
        description: '清空历史缓存重新采集'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LOOKBACK_DAYS: ${{ inputs.lookback_days || 1 }}
  CLEAR_PAPER_CACHE: ${{ inputs.clear_cache && 'true' || 'false' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check active schedule
        id: schedule_gate
        run: >-
          python3 scripts/check_active_schedule.py
          --config config/active_schedule.json
          --event-name "${{ github.event_name }}"
          --event-schedule "${{ github.event.schedule }}"

      - name: Record active collector schedule probe
        if: github.event_name == 'schedule' && steps.schedule_gate.outputs.should_run == 'true'
        run: >-
          python3 scripts/record_schedule_probe.py
          --output-dir web/data/schedule-probe
          --schedule "${{ github.event.schedule }}"
          --event-name "${{ github.event_name }}"
          --workflow "${{ github.workflow }}"
          --repository "${{ github.repository }}"
          --server-url "${{ github.server_url }}"
          --run-id "${{ github.run_id }}"
          --run-attempt "${{ github.run_attempt }}"
          --actor "${{ github.actor }}"

      - name: Collect papers
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-v4-flash' }}
          ARXIV_EXPAND_CATEGORY_SEARCH: 'true'
          ARXIV_KEYWORD_QUERY_CHUNKS: ${{ vars.ARXIV_KEYWORD_QUERY_CHUNKS || '2' }}
          ARXIV_CATEGORY_MAX_RESULTS: '75'
          ENABLE_ARXIV_HTML_ENRICHMENT: ${{ vars.ENABLE_ARXIV_HTML_ENRICHMENT || 'true' }}
          ARXIV_HTML_MAX_PAPERS: ${{ vars.ARXIV_HTML_MAX_PAPERS || '10' }}
          ARXIV_HTML_MAX_CHARS: ${{ vars.ARXIV_HTML_MAX_CHARS || '6000' }}
          LLM_RERANK_BEFORE_SELECTION: ${{ vars.LLM_RERANK_BEFORE_SELECTION || 'true' }}
          LLM_RERANK_POOL: ${{ vars.LLM_RERANK_POOL || '20' }}
          MAX_NEW_PAPERS: ${{ vars.MAX_NEW_PAPERS || '30' }}
          MAX_STORED_PAPERS: ${{ vars.MAX_STORED_PAPERS || '150' }}
          MAX_SUMMARIES: ${{ vars.MAX_SUMMARIES || '20' }}
        run: >-
          python3 scripts/collect_papers.py
          --days "${{ env.LOOKBACK_DAYS }}"
          --max-per-topic 25
          --max-summaries "${MAX_SUMMARIES}"
          --max-new-papers "${MAX_NEW_PAPERS}"
          --max-stored-papers "${MAX_STORED_PAPERS}"
          --incremental-since-last-run

      - name: Commit and push
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@paper-daily.local"
          git add web/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          # Schedule Probe and Auto Adjust can commit to main at the same time.
          # Rebase the generated data commit before retrying a non-fast-forward push.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push failed; refreshing origin and retrying (${attempt}/5)"
            if ! git fetch origin "${GITHUB_REF_NAME}"; then
              echo "Could not fetch origin; retrying"
              sleep $((attempt * 5))
              continue
            fi
            if ! git rebase "origin/${GITHUB_REF_NAME}"; then
              git rebase --abort || true
              echo "Rebase conflict: another workflow changed the same data files"
              exit 1
            fi
            sleep $((attempt * 5))
          done
          exit 1

      - name: Upload Pages artifact
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Deploy to GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/deploy-pages@v4

      - name: PushPlus notification
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          papers_file="web/data/papers.json"
          if [ ! -f "$papers_file" ]; then echo "No papers file"; exit 0; fi

          total=$(python3 -c "import json; d=json.load(open('$papers_file')); print(len(d.get('papers',[])))")
          today=$(TZ=Asia/Shanghai date +%Y-%m-%d)

          new_count=$(python3 -c "
          import datetime as dt, json
          from zoneinfo import ZoneInfo
          d=json.load(open('$papers_file'))
          today='$today'
          count=0
          for p in d.get('papers',[]):
              value=p.get('first_seen_at','') or ''
              try:
                  seen=dt.datetime.fromisoformat(value.replace('Z','+00:00')).astimezone(ZoneInfo('Asia/Shanghai'))
              except ValueError:
                  continue
              if seen.date().isoformat() == today: count+=1
          print(count)
          ")

          new_list=$(python3 -c "
          import datetime as dt, html, json
          from zoneinfo import ZoneInfo
          d=json.load(open('$papers_file'))
          today='$today'
          lines=[]
          for p in d.get('papers',[]):
              value=p.get('first_seen_at','') or ''
              try:
                  seen=dt.datetime.fromisoformat(value.replace('Z','+00:00')).astimezone(ZoneInfo('Asia/Shanghai'))
              except ValueError:
                  continue
              if seen.date().isoformat() != today: continue
              title=html.escape(p.get('title','?'))
              score=p.get('best_match',{}).get('score',0)
              summary = p.get('chinese_summary',{}) or {}
              innovation = html.escape(summary.get('innovation','') or summary.get('method','') or '')
              if innovation:
                  lines.append(f'<li><b>{title}</b> <span style=\"color:#999\">({score:.2f})</span><br><span style=\"color:#666;font-size:12px\">{innovation[:120]}</span></li>')
              else:
                  lines.append(f'<li><b>{title}</b> <span style=\"color:#999\">({score:.2f})</span></li>')
          print('<ol>' + ''.join(lines[:10]) + '</ol>' if lines else '<p>今日暂无新增论文</p>')
          ")

          content="
          <h3>📄 Paper Daily 今日更新</h3>
          <p>今日新论文: <strong>${new_count}</strong> 篇 | 总论文: <strong>${total}</strong> 篇</p>
          ${new_list}
          <p style='margin-top:12px;color:#999;font-size:12px'>
            👉 <a href='https://s1lveryin.github.io/paper-daily/'>查看完整列表</a>
          </p>
          "

          payload=$(cat <<EOF
          {
            "token": "${PUSHPLUS_TOKEN}",
            "title": "Paper Daily — 今日 ${new_count} 篇新论文",
            "content": $(echo "$content" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))"),
            "template": "html"
          }
          EOF
          )

          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "$payload" | python3 -c "import sys,json; r=json.load(sys.stdin); print('PushPlus:', r.get('msg','ok') if r.get('code')==200 else r)"

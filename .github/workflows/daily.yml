name: Daily Papers

on:
  schedule:
    - cron: '3 1 * * *'  # 9:03am Beijing time (UTC+8)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '回看天数（留空则使用 cron 默认值 1）'
        required: false
        type: number
      clear_cache:
        description: '清空历史缓存重新采集'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LOOKBACK_DAYS: ${{ inputs.lookback_days || 1 }}
  CLEAR_PAPER_CACHE: ${{ inputs.clear_cache && 'true' || 'false' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect papers
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL: deepseek-v4-flash
        run: python3 scripts/collect_papers.py --days ${{ env.LOOKBACK_DAYS }} --max-per-topic 25 --max-summaries 40 --max-new-papers 50 --max-stored-papers 200

      - name: Commit and push
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@paper-daily.local"
          git add web/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: PushPlus notification
        if: ${{ secrets.PUSHPLUS_TOKEN != '' }}
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          papers_file="web/data/papers.json"
          if [ ! -f "$papers_file" ]; then echo "No papers file"; exit 0; fi

          total=$(python3 -c "import json; d=json.load(open('$papers_file')); print(len(d.get('papers',[])))")
          today=$(date +%Y-%m-%d)
          today_count=$(python3 -c "
          import json; d=json.load(open('$papers_file'))
          today='$today'
          count=0
          for p in d.get('papers',[]):
              pub=p.get('published','') or p.get('last_seen_at','') or ''
              if pub.startswith(today): count+=1
          print(count)
          ")

          paper_list=$(python3 -c "
          import json, html
          d=json.load(open('$papers_file'))
          today='$today'
          lines=[]
          for p in d.get('papers',[]):
              pub=p.get('published','') or p.get('last_seen_at','') or ''
              if not pub.startswith(today): continue
              title=html.escape(p.get('title','?'))
              score=p.get('best_match',{}).get('score',0)
              lines.append(f'<li>💡 {title} <span style=\"color:#999\">({score:.2f})</span></li>')
          print('<ol>' + ''.join(lines) + '</ol>' if lines else '<p>今日暂无新增论文</p>')
          ")

          content="
          <h3>📄 Paper Daily 今日更新</h3>
          <p>今日新论文: <strong>${today_count}</strong> 篇 | 总论文: <strong>${total}</strong> 篇</p>
          ${paper_list}
          <p style='margin-top:12px;color:#999;font-size:12px'>
            👉 <a href='https://s1lveryin.github.io/paper-daily/'>查看完整列表</a>
          </p>
          "

          payload=$(cat <<EOF
          {
            "token": "${PUSHPLUS_TOKEN}",
            "title": "Paper Daily — 今日 ${today_count} 篇新论文",
            "content": $(echo "$content" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))"),
            "template": "html"
          }
          EOF
          )

          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "$payload" | python3 -c "import sys,json; r=json.load(sys.stdin); print('PushPlus:', r.get('msg','ok') if r.get('code')==200 else r)"

name: Daily Papers

on:
  schedule:
    - cron: '0 22 * * *'  # 6am Beijing time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect papers
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LOOKBACK_DAYS: 1
          MAX_PER_TOPIC: 25
          MAX_SUMMARIES: 40
          MAX_NEW_PAPERS: 50
          MAX_STORED_PAPERS: 200
        run: python3 scripts/collect_papers.py --days 1 --max-per-topic 25 --max-summaries 40 --max-new-papers 50 --max-stored-papers 200

      - name: Commit and push
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@paper-daily.local"
          git add web/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

name: Daily Papers

on:
  schedule:
    - cron: '3 1 * * *'  # 9:03am Beijing time (UTC+8)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '回看天数（留空则使用 cron 默认值 1）'
        required: false
        type: number
      clear_cache:
        description: '清空历史缓存重新采集'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LOOKBACK_DAYS: ${{ inputs.lookback_days || 1 }}
  CLEAR_PAPER_CACHE: ${{ inputs.clear_cache && 'true' || 'false' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect papers
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL: deepseek-v4-flash
        run: python3 scripts/collect_papers.py --days ${{ env.LOOKBACK_DAYS }} --max-per-topic 25 --max-summaries 40 --max-new-papers 50 --max-stored-papers 200

      - name: Commit and push
        run: |
          git config user.name "paper-bot"
          git config user.email "bot@paper-daily.local"
          git add web/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

name: Daily Paper Collection

on:
  schedule:
    - cron: '0 22 * * *'   # 6am Beijing time (22:00 UTC)
  workflow_dispatch:        # manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect papers
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_NEW_PAPERS: 50
          MAX_STORED_PAPERS: 200
        run: |
          python3 scripts/collect_papers.py \
            --days 1 \
            --max-per-topic 25 \
            --max-summaries 40 \
            --max-new-papers 50 \
            --max-stored-papers 200

      - name: Commit and push
        run: |
          git config user.name "paper-daily-bot"
          git config user.email "bot@paper-daily.local"
          git add web/data/
          git diff --staged --quiet || git commit -m "data: daily paper update $(date +%Y-%m-%d)"
          git push
